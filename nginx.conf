server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión para servir los archivos más rápido
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Regla para SPA: cualquier ruta desconocida devuelve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cachear los archivos estáticos generados por Vite (llevan hash en el nombre)
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
